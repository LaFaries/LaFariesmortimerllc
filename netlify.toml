# Fix trailing slash on LAAP Suite
[[redirects]]
  from = "/laap-suite/"
  to = "/laap-suite"
  status = 301
  force = true

# Fix /tutorial redirect
[[redirects]]
  from = "/tutorial"
  to = "/"
  status = 301
  force = true

# Remove dead .docx links — point to a real page
[[redirects]]
  from = "/docs/it-cybersecurity-basics.docx"
  to = "/laap-suite"
  status = 301
  force = true

[[redirects]]
  from = "/templates/meeting-agenda.docx"
  to = "/laap-suite"
  status = 301
  force = true
