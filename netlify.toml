# Redirect old LAAP Suite URLs to actual LAAP page
[[redirects]]
  from = "/laap-suite"
  to = "/laap"
  status = 301
  force = true

[[redirects]]
  from = "/laap-suite/"
  to = "/laap"
  status = 301
  force = true

# Fix /tutorial → /tutorials (the real page)
[[redirects]]
  from = "/tutorial"
  to = "/tutorials"
  status = 301
  force = true

# Dead .docx files → relevant real pages
[[redirects]]
  from = "/docs/it-cybersecurity-basics.docx"
  to = "/tutorials"
  status = 301
  force = true

[[redirects]]
  from = "/templates/meeting-agenda.docx"
  to = "/templates"
  status = 301
  force = true

# Annual Maintenance clean URL
[[redirects]]
  from = "/annual-maintenance"
  to = "/annual-maintenance.html"
  status = 200

# Wildcard SPA fallback — MUST be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
